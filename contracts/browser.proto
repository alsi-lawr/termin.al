syntax = "proto3";

package terminal.v1;

option csharp_namespace = "Termin.Al.Contracts.V1";

message EmptyRequest {}

enum SessionKind {
  SESSION_KIND_UNSPECIFIED = 0;
  SESSION_KIND_ANONYMOUS = 1;
  SESSION_KIND_GITHUB_VIEWER = 2;
  SESSION_KIND_CV_VIEWER = 3;
  SESSION_KIND_GITHUB_CV_VIEWER = 4;
  SESSION_KIND_OWNER = 5;
}

message SessionResponse {
  SessionKind kind = 1;
  string login = 2;
  string csrf_token = 3;
}

service SessionApi {
  rpc ReadSession(EmptyRequest) returns (SessionResponse);
  rpc Logout(EmptyRequest) returns (EmptyRequest);
}

enum CacheState {
  CACHE_STATE_UNSPECIFIED = 0;
  CACHE_STATE_FRESH = 1;
  CACHE_STATE_STALE = 2;
}

message CacheMetadata {
  CacheState state = 1;
  string fetched_at = 2;
  string fresh_until = 3;
  string stale_until = 4;
}

message ContentSource {
  string repository = 1;
  string path = 2;
  string revision = 3;
  string url = 4;
}

enum CatalogEntryKind {
  CATALOG_ENTRY_KIND_UNSPECIFIED = 0;
  CATALOG_ENTRY_KIND_DIRECTORY = 1;
  CATALOG_ENTRY_KIND_FILE = 2;
  CATALOG_ENTRY_KIND_LOCKED_FILE = 3;
}

message CatalogEntry {
  CatalogEntryKind kind = 1;
  string id = 2;
  string path = 3;
  string updated_at = 4;
  int32 size = 5;
  string document_handle = 6;
}

message CatalogResponse {
  repeated CatalogEntry entries = 1;
  ContentSource source = 2;
  CacheMetadata cache = 3;
}

enum DocumentKind {
  DOCUMENT_KIND_UNSPECIFIED = 0;
  DOCUMENT_KIND_PAGE = 1;
  DOCUMENT_KIND_BLOG = 2;
  DOCUMENT_KIND_NOTE = 3;
}

message DocumentRequest { string id = 1; }

message DocumentBase {
  string default_branch = 1;
  string head_sha = 2;
  string blob_sha = 3;
  string repository_path = 4;
  string virtual_path = 5;
}

message RepositoryBaseResponse {
  string default_branch = 1;
  string head_sha = 2;
}

message DocumentResponse {
  DocumentKind kind = 1;
  string id = 2;
  string slug = 3;
  string path = 4;
  string title = 5;
  string summary = 6;
  string updated_at = 7;
  repeated string tags = 8;
  string body = 9;
  ContentSource source = 10;
  CacheMetadata cache = 11;
  DocumentBase base = 12;
  string rendered_html = 13;
}

message Project {
  string id = 1;
  string slug = 2;
  string name = 3;
  string summary = 4;
  string url = 5;
  string repository = 6;
  string collection_path = 7;
  string updated_at = 8;
  repeated string tags = 9;
  string readme = 10;
  string rendered_html = 11;
}

message ProjectsResponse {
  repeated Project projects = 1;
  ContentSource source = 2;
  CacheMetadata cache = 3;
}

message NowResponse {
  string title = 1;
  string body = 2;
  string updated_at = 3;
  ContentSource source = 4;
  CacheMetadata cache = 5;
  string rendered_html = 6;
}

message Commit {
  string sha = 1;
  string summary = 2;
  string authored_at = 3;
  string url = 4;
}

message Release {
  string tag = 1;
  string name = 2;
  string published_at = 3;
  string body = 4;
  string url = 5;
  repeated Commit commits = 6;
}

message ChangelogResponse {
  repeated Commit unreleased = 1;
  repeated Release releases = 2;
  ContentSource source = 3;
  CacheMetadata cache = 4;
  string rendered_html = 5;
}

service ContentApi {
  rpc ReadRepositoryBase(EmptyRequest) returns (RepositoryBaseResponse);
  rpc ReadCatalog(EmptyRequest) returns (CatalogResponse);
  rpc ReadDocument(DocumentRequest) returns (DocumentResponse);
  rpc ReadProjects(EmptyRequest) returns (ProjectsResponse);
  rpc ReadNow(EmptyRequest) returns (NowResponse);
  rpc ReadChangelog(EmptyRequest) returns (ChangelogResponse);
}

enum StatsStorageState {
  STATS_STORAGE_STATE_UNSPECIFIED = 0;
  STATS_STORAGE_STATE_WRITABLE = 1;
  STATS_STORAGE_STATE_READ_ONLY = 2;
}

message StatsContentCount {
  string content_id = 1;
  int64 page_views = 2;
}

message StatsDailyCount {
  string date = 1;
  int64 sessions = 2;
  int64 page_views = 3;
}

message StatsSnapshot {
  int64 total_sessions = 1;
  int64 total_page_views = 2;
  repeated StatsContentCount page_views_by_content = 3;
  repeated StatsDailyCount daily = 4;
  StatsStorageState storage_state = 5;
}

message RecordViewRequest { string content_id = 1; }

service StatisticsApi {
  rpc ReadSnapshot(EmptyRequest) returns (StatsSnapshot);
  rpc RecordView(RecordViewRequest) returns (StatsSnapshot);
}

message UnlockCvRequest { string key = 1; }
message CvDocumentResponse { string markdown = 1; }

service CvApi {
  rpc Unlock(UnlockCvRequest) returns (EmptyRequest);
  rpc Lock(EmptyRequest) returns (EmptyRequest);
  rpc Read(EmptyRequest) returns (CvDocumentResponse);
}

enum PublicationOperation {
  PUBLICATION_OPERATION_UNSPECIFIED = 0;
  PUBLICATION_OPERATION_ADD = 1;
  PUBLICATION_OPERATION_UPDATE = 2;
  PUBLICATION_OPERATION_REMOVE = 3;
}

message PublicationAsset {
  string destination_path = 1;
  string declared_media_type = 2;
  bytes content = 3;
}

message PublicationRequest {
  PublicationOperation operation = 1;
  string repository_path = 2;
  string virtual_path = 3;
  string markdown = 4;
  string expected_default_branch = 5;
  string expected_head_sha = 6;
  string expected_blob_sha = 7;
  repeated PublicationAsset assets = 8;
  string removal_confirmation = 9;
}

message PublicationResponse {
  bool conflict = 1;
  string sha = 2;
  string url = 3;
  string default_branch = 4;
  string document_blob_sha = 5;
  string local_markdown = 6;
  string upstream_markdown = 7;
  string head_sha = 8;
  string blob_sha = 9;
}

message ManagedRemovalRequest {
  string virtual_path = 1;
  bool recursive = 2;
  string confirmation = 3;
}

message ManagedRemovalResponse {
  string sha = 1;
  string url = 2;
}

service PublicationApi {
  rpc Publish(PublicationRequest) returns (PublicationResponse);
  rpc RemoveManaged(ManagedRemovalRequest) returns (ManagedRemovalResponse);
}
